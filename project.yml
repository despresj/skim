name: Skim
options:
  bundleIdPrefix: com.despresj
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"

targets:
  Skim:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    # Compile the SwiftUI shell together with the pure core as one module.
    # CoreChecks (a macOS self-check executable) is deliberately excluded.
    sources:
      - path: App
      - path: Sources/SkimCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.despresj.skim
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        # Personal team, so device signing survives `xcodegen generate`.
        DEVELOPMENT_TEAM: Z26YTV7798
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarHidden: "YES"
