name: Skim
options:
  bundleIdPrefix: com.despresj
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"

targets:
  Skim:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    # Compile the SwiftUI shell together with the pure core as one module.
    # CoreChecks (a macOS self-check executable) is deliberately excluded.
    sources:
      - path: App
      - path: Sources/SkimCore
    # XcodeGen-managed Info.plist (not hand-edited). We need an explicit plist —
    # not the generated one — because CFBundleURLTypes is an array and can't be
    # expressed as a scalar INFOPLIST_KEY_*. The four keys below were previously
    # INFOPLIST_KEY_* settings; they move here so the scheme can join them.
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIStatusBarHidden: true
        # Register skim://read so iOS Shortcuts / deep links route text and URLs
        # straight into the reader (see DeepLinkParser).
        CFBundleURLTypes:
          - CFBundleURLName: com.despresj.skim
            CFBundleURLSchemes: [skim]
        # Make Skim an "Open In" target for plain-text files so a Shortcut can
        # write text to a .txt and open it here — large bodies of text arrive
        # intact via the file (no skim:// URL truncation, no pasteboard prompt).
        # public.plain-text covers the .txt extension; public.text broadens to
        # any text payload. Handled by ReaderViewModel.handleFileURL via onOpenURL.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
              - public.text
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.despresj.skim
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        # Personal team, so device signing survives `xcodegen generate`.
        DEVELOPMENT_TEAM: Z26YTV7798
